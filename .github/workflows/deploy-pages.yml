name: Deploy Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: main-src/.node-version
          cache: npm
          cache-dependency-path: |
            main-src/package-lock.json
            staging-src/package-lock.json

      - name: Build production site (main)
        working-directory: main-src
        run: |
          npm ci
          npm run build

      - name: Build staging preview (staging branch)
        working-directory: staging-src
        run: |
          npm ci
          npm run build -- --base=/gis-toolbox/staging/

      - name: Assemble Pages artifact
        run: |
          mkdir -p combined
          cp -a main-src/dist/. combined/
          mkdir -p combined/staging
          cp -a staging-src/dist/. combined/staging/
          touch combined/.nojekyll combined/staging/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
