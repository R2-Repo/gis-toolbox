name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type promote to confirm
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Require confirmation
        if: inputs.confirm != 'promote'
        run: |
          echo "Promotion cancelled. Type exactly 'promote' in the confirmation field."
          exit 1

  promote:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging for tests
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: staging-src/.node-version
          cache: npm
          cache-dependency-path: staging-src/package-lock.json

      - name: Run tests on staging
        working-directory: staging-src
        run: |
          npm ci
          npm test

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin staging
          git merge origin/staging --no-edit -m "Promote staging to production"

      - name: Push main
        run: git push origin main
