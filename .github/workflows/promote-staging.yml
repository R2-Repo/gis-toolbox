name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type promote to confirm
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Require confirmation
        if: inputs.confirm != 'promote'
        run: |
          echo "Promotion cancelled. Type exactly 'promote' in the confirmation field."
          exit 1

  promote:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging for tests
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: staging-src/.node-version
          cache: npm
          cache-dependency-path: staging-src/package-lock.json

      - name: Run tests on staging
        working-directory: staging-src
        run: |
          npm ci
          npm test

      - name: Check if promotion is needed
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AHEAD=$(gh api "repos/${{ github.repository }}/compare/main...staging" --jq '.ahead_by')
          echo "ahead_by=$AHEAD" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" -eq 0 ]; then
            echo "staging is already up to date with main. Nothing to promote."
          else
            echo "staging is $AHEAD commit(s) ahead of main."
          fi

      - name: Create or find promotion pull request
        if: steps.diff.outputs.ahead_by != '0'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Using existing PR #$EXISTING"
            echo "number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            gh pr create \
              --base main \
              --head staging \
              --title "Promote staging to production" \
              --body "Automated promotion from the Promote to Production workflow (run ${{ github.run_id }})."
            NUMBER=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')
            echo "Created PR #$NUMBER"
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge promotion pull request
        if: steps.diff.outputs.ahead_by != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --merge
